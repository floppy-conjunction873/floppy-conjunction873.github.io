name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A72EC9: ${{ secrets.A72EC9 }}
          B0B08D: ${{ secrets.B0B08D }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A72EC9', '')
          meta_b = os.environ.get('B0B08D', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 738d4460eddd55b1d3e804ae12391ce262572da0c718 -->', meta_a)
          if meta_b:
              out = out.replace('<!--  -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
